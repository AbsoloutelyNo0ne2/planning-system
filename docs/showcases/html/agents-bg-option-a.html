<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agents Panel - Option A: Subtle Blobs + 70% Dark Overlay</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-base: #0c0f1a;
  --bg-surface: #121625;
  --bg-card: #1a1f35;
  --accent-300: #d8b4fe;
  --accent-400: #c084fc;
  --accent-500: #a855f7;
  --text-primary: #f1f5f9;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-base);
  min-height: 100vh;
  display: flex;
}

.app-container {
  display: flex;
  width: 100%;
  min-height: 100vh;
}

/* AGENTS PANEL - Left 1/3 */
.agents-panel {
  width: 33.333%;
  min-width: 280px;
  max-width: 400px;
  position: relative;
  overflow: hidden;
  background: var(--bg-base);
}

/* Canvas for fluid blobs */
#blob-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* Dark overlay on top of blobs */
.dark-overlay {
  position: absolute;
  inset: 0;
  background: rgba(12, 15, 26, 0.7);
  z-index: 2;
  pointer-events: none;
}

/* Agents content on top */
.agents-content {
  position: relative;
  z-index: 3;
  padding: 1.5rem;
  height: 100%;
  overflow-y: auto;
}

.agents-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
}

.agents-title {
  font-size: 1.125rem;
  font-weight: 600;
  color: var(--text-primary);
}

.add-agent-btn {
  width: 32px;
  height: 32px;
  background: var(--bg-card);
  border: 1px solid #2a3149;
  border-radius: 8px;
  color: var(--text-muted);
  font-size: 1.25rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, color 0.2s;
}

.add-agent-btn:hover {
  background: var(--accent-500);
  color: white;
}

/* Agent cards */
.agent-list {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.agent-card {
  background: rgba(26, 31, 53, 0.85);
  border: 1px solid #2a3149;
  border-radius: 12px;
  padding: 1rem;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}

.agent-card:hover {
  border-color: var(--accent-500);
  background: rgba(26, 31, 53, 0.95);
}

.agent-card.active {
  border-color: var(--accent-400);
  background: rgba(168, 85, 247, 0.1);
}

.agent-card-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.5rem;
}

.agent-avatar {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent-500), var(--accent-300));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 0.85rem;
  font-weight: 600;
}

.agent-name {
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-primary);
}

.agent-status {
  margin-left: auto;
  width: 8px;
  height: 8px;
  background: #22c55e;
  border-radius: 50%;
}

.agent-card-desc {
  font-size: 0.8rem;
  color: var(--text-dim);
  line-height: 1.4;
}

/* MAIN CONTENT AREA - Right 2/3 */
.main-content {
  flex: 1;
  background: var(--bg-surface);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
}

.content-placeholder {
  text-align: center;
}

.content-placeholder h2 {
  font-size: 1.25rem;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
}

.content-placeholder p {
  color: var(--text-dim);
}

/* Option badge */
.option-badge {
  position: absolute;
  top: 1rem;
  right: 1rem;
  z-index: 10;
  background: rgba(168, 85, 247, 0.2);
  border: 1px solid var(--accent-500);
  padding: 0.35rem 0.75rem;
  border-radius: 6px;
  font-size: 0.75rem;
  color: var(--accent-300);
  font-weight: 500;
}
</style>
</head>
<body>
<div class="app-container">
  <!-- AGENTS PANEL -->
  <div class="agents-panel">
    <canvas id="blob-canvas"></canvas>
    <div class="dark-overlay"></div>
    
    <div class="agents-content">
      <div class="option-badge">Option A</div>
      
      <div class="agents-header">
        <h2 class="agents-title">Agents</h2>
        <button class="add-agent-btn">+</button>
      </div>
      
      <div class="agent-list">
        <div class="agent-card active">
          <div class="agent-card-header">
            <div class="agent-avatar">P</div>
            <span class="agent-name">Planner</span>
            <div class="agent-status"></div>
          </div>
          <p class="agent-card-desc">Strategic planning and task orchestration</p>
        </div>
        
        <div class="agent-card">
          <div class="agent-card-header">
            <div class="agent-avatar">R</div>
            <span class="agent-name">Researcher</span>
            <div class="agent-status"></div>
          </div>
          <p class="agent-card-desc">Information gathering and analysis</p>
        </div>
        
        <div class="agent-card">
          <div class="agent-card-header">
            <div class="agent-avatar">C</div>
            <span class="agent-name">Coder</span>
            <div class="agent-status"></div>
          </div>
          <p class="agent-card-desc">Implementation and code generation</p>
        </div>
        
        <div class="agent-card">
          <div class="agent-card-header">
            <div class="agent-avatar">D</div>
            <span class="agent-name">Designer</span>
            <div class="agent-status"></div>
          </div>
          <p class="agent-card-desc">UI/UX design and visual assets</p>
        </div>
        
        <div class="agent-card">
          <div class="agent-card-header">
            <div class="agent-avatar">Q</div>
            <span class="agent-name">QA</span>
            <div class="agent-status"></div>
          </div>
          <p class="agent-card-desc">Testing and quality assurance</p>
        </div>
      </div>
    </div>
  </div>
  
  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="content-placeholder">
      <h2>Main Content Area</h2>
      <p>Select an agent to view details</p>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('blob-canvas');
  const ctx = canvas.getContext('2d');

  // OPTION A CONFIGURATION
  // Subtle blobs + 70% dark overlay
  // Blob radius: 150-280px (smaller)
  // Blob saturation: 40% (muted)
  // Blob opacity: 0.4
  // Dark overlay: rgba(12, 15, 26, 0.7)
  // Same motion as login
  const CONFIG = {
    numBlobs: 4,
    pointsPerBlob: 8,
    
    // Smaller blob sizes for agents panel
    minRadius: 150,
    maxRadius: 280,
    
    // Same motion speed as login
    wobbleSpeed: 0.0001,
    morphSpeed: 0.00004,
    
    // Colors - muted saturation
    baseHue: 280,
    baseSaturation: 40, // Muted (was 60)
    baseLightness: 50,
    blobOpacity: 0.4,
    
    // Blur - same as login
    blurRadius: 30,
    minBlur: 10,
    maxBlur: 60,
    motionBlurFactor: 8,
    depthDriftSpeed: 0.00008,
    depthOscillation: 0.15,
    
    // Interaction - subtle
    interactionRadius: 300,
    friction: 0.92,
    returnForce: 0.003,
    cursorInfluence: 0.1,
    repulsionStrength: 0.12,
    
    // Blob repulsion
    blobRepulsion: {
      enabled: true,
      minDistanceFactor: 1.5,
      strength: 0.015,
      maxDistance: 500
    }
  };

  let blobs = [];
  let cursorX = 0;
  let cursorY = 0;
  let prevCursorX = 0;
  let prevCursorY = 0;
  let cursorVx = 0;
  let cursorVy = 0;
  let isCursorInCanvas = false;

  class FluidBlob {
    constructor(x, y, radius) {
      this.x = x;
      this.y = y;
      this.originX = x;
      this.originY = y;
      this.vx = 0;
      this.vy = 0;
      this.radius = radius;
      this.points = CONFIG.pointsPerBlob;
      this.hue = CONFIG.baseHue + (Math.random() - 0.5) * 20;
      
      this.driftX = (Math.random() - 0.5) * 0.06;
      this.driftY = (Math.random() - 0.5) * 0.06;
      this.rotationSpeed = (Math.random() - 0.5) * 0.00006;
      
      this.offsets = [];
      for (let i = 0; i < this.points; i++) {
        this.offsets.push({
          amplitude: Math.random() * 35 + 15,
          frequency: Math.random() * 0.005 + 0.0025,
          phase: Math.random() * Math.PI * 2
        });
      }
      
      this.phase = Math.random() * Math.PI * 2;
      this.morphPhase = Math.random() * Math.PI * 2;
      this.depth = Math.random();
      this.baseDepth = this.depth;
      this.depthPhase = Math.random() * Math.PI * 2;
    }

    update(time) {
      this.depthPhase += CONFIG.depthDriftSpeed;
      const depthOscillation = Math.sin(this.depthPhase) * CONFIG.depthOscillation;
      this.depth = Math.max(0, Math.min(1, this.baseDepth + depthOscillation));
      
      this.vx *= CONFIG.friction;
      this.vy *= CONFIG.friction;
      
      const driftTime = time * 0.000025;
      const driftX = Math.sin(driftTime + this.phase) * 35;
      const driftY = Math.cos(driftTime + this.phase * 1.3) * 30;
      
      const targetX = this.originX + driftX;
      const targetY = this.originY + driftY;
      
      this.vx += (targetX - this.x) * CONFIG.returnForce;
      this.vy += (targetY - this.y) * CONFIG.returnForce;
      
      this.x += this.driftX;
      this.y += this.driftY;
      
      if (this.x < -this.radius) this.x = canvas.width + this.radius;
      if (this.x > canvas.width + this.radius) this.x = -this.radius;
      if (this.y < -this.radius) this.y = canvas.height + this.radius;
      if (this.y > canvas.height + this.radius) this.y = -this.radius;
      
      this.x += this.vx;
      this.y += this.vy;
    }

    draw(ctx, time) {
      const normalizedHue = ((this.hue % 360) + 360) % 360;
      const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
      
      const depthBlur = CONFIG.minBlur + (this.depth * (CONFIG.maxBlur - CONFIG.minBlur));
      const motionBlur = Math.min(speed * CONFIG.motionBlurFactor, 15);
      const dynamicBlur = depthBlur + motionBlur;
      
      ctx.save();
      ctx.filter = `blur(${dynamicBlur}px)`;
      
      ctx.beginPath();
      
      for (let i = 0; i <= this.points; i++) {
        const angle = (i / this.points) * Math.PI * 2 + time * this.rotationSpeed;
        const offset = this.offsets[i % this.points];
        
        const wobble1 = Math.sin(time * offset.frequency + offset.phase) * offset.amplitude;
        const wobble2 = Math.cos(time * offset.frequency * 0.8 + offset.phase * 0.7) * offset.amplitude * 0.3;
        const morphWobble = Math.sin(time * CONFIG.morphSpeed + this.morphPhase + i * 0.5) * 12;
        
        const r = this.radius + wobble1 + wobble2 + morphWobble;
        const x = this.x + Math.cos(angle) * r;
        const y = this.y + Math.sin(angle) * r;
        
        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          const prevAngle = ((i - 1) / this.points) * Math.PI * 2 + time * this.rotationSpeed;
          const prevOffset = this.offsets[(i - 1) % this.points];
          const prevWobble1 = Math.sin(time * prevOffset.frequency + prevOffset.phase) * prevOffset.amplitude;
          const prevWobble2 = Math.cos(time * prevOffset.frequency * 0.8 + prevOffset.phase * 0.7) * prevOffset.amplitude * 0.3;
          const prevMorphWobble = Math.sin(time * CONFIG.morphSpeed + this.morphPhase + (i - 1) * 0.5) * 12;
          const prevR = this.radius + prevWobble1 + prevWobble2 + prevMorphWobble;
          
          const cp1x = this.x + Math.cos(prevAngle + 0.3) * prevR * 1.1;
          const cp1y = this.y + Math.sin(prevAngle + 0.3) * prevR * 1.1;
          
          ctx.quadraticCurveTo(cp1x, cp1y, x, y);
        }
      }
      
      ctx.closePath();
      
      const gradient = ctx.createRadialGradient(
        this.x, this.y, 0,
        this.x, this.y, this.radius * 2
      );
      
      // Muted colors with reduced opacity
      gradient.addColorStop(0, `hsla(${normalizedHue}, ${CONFIG.baseSaturation + 10}%, ${CONFIG.baseLightness + 12}%, ${CONFIG.blobOpacity * 0.9})`);
      gradient.addColorStop(0.3, `hsla(${normalizedHue}, ${CONFIG.baseSaturation}%, ${CONFIG.baseLightness + 5}%, ${CONFIG.blobOpacity * 0.65})`);
      gradient.addColorStop(0.6, `hsla(${normalizedHue}, ${CONFIG.baseSaturation - 5}%, ${CONFIG.baseLightness}%, ${CONFIG.blobOpacity * 0.35})`);
      gradient.addColorStop(1, `hsla(${normalizedHue}, ${CONFIG.baseSaturation - 10}%, ${CONFIG.baseLightness - 10}%, 0)`);
      
      ctx.fillStyle = gradient;
      ctx.fill();
      
      ctx.restore();
    }
  }

  function initBlobs() {
    blobs = [];
    
    const width = canvas.width;
    const height = canvas.height;
    
    // Positioned for agents panel
    const positions = [
      { radius: 220, x: 0.25, y: 0.25 },
      { radius: 260, x: 0.7, y: 0.35 },
      { radius: 180, x: 0.3, y: 0.65 },
      { radius: 240, x: 0.75, y: 0.75 }
    ];
    
    positions.forEach(pos => {
      const x = pos.x * width;
      const y = pos.y * height;
      blobs.push(new FluidBlob(x, y, pos.radius));
    });
  }

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    initBlobs();
  }

  function applyCursorForce() {
    if (!isCursorInCanvas) return;
    
    blobs.forEach(blob => {
      const dx = cursorX - blob.x;
      const dy = cursorY - blob.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < CONFIG.interactionRadius && dist > 0) {
        const force = (CONFIG.interactionRadius - dist) / CONFIG.interactionRadius;
        
        blob.vx += cursorVx * force * CONFIG.cursorInfluence;
        blob.vy += cursorVy * force * CONFIG.cursorInfluence;
        
        blob.vx -= (dx / dist) * force * CONFIG.repulsionStrength;
        blob.vy -= (dy / dist) * force * CONFIG.repulsionStrength;
      }
    });
  }

  function applyBlobRepulsion() {
    if (!CONFIG.blobRepulsion.enabled) return;
    
    const { minDistanceFactor, strength, maxDistance } = CONFIG.blobRepulsion;
    
    for (let i = 0; i < blobs.length; i++) {
      const blobA = blobs[i];
      
      for (let j = i + 1; j < blobs.length; j++) {
        const blobB = blobs[j];
        
        const dx = blobB.x - blobA.x;
        const dy = blobB.y - blobA.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist > maxDistance) continue;
        
        const minDist = (blobA.radius + blobB.radius) * minDistanceFactor;
        
        if (dist < minDist && dist > 0.01) {
          const force = (minDist - dist) / minDist * strength;
          
          const nx = dx / dist;
          const ny = dy / dist;
          
          blobA.vx -= nx * force;
          blobA.vy -= ny * force;
          
          blobB.vx += nx * force;
          blobB.vy += ny * force;
        }
      }
    }
  }

  function animate(currentTime) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    cursorVx = (cursorX - prevCursorX) * 0.5;
    cursorVy = (cursorY - prevCursorY) * 0.5;
    prevCursorX = cursorX;
    prevCursorY = cursorY;
    
    applyCursorForce();
    applyBlobRepulsion();
    
    blobs.forEach(blob => {
      blob.update(currentTime);
    });
    
    const sortedBlobs = [...blobs].sort((a, b) => a.y - b.y);
    
    sortedBlobs.forEach(blob => {
      blob.draw(ctx, currentTime);
    });
    
    requestAnimationFrame(animate);
  }

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    cursorX = e.clientX - rect.left;
    cursorY = e.clientY - rect.top;
    isCursorInCanvas = true;
  });

  canvas.addEventListener('mouseleave', () => {
    isCursorInCanvas = false;
  });

  canvas.addEventListener('mouseenter', () => {
    prevCursorX = cursorX;
    prevCursorY = cursorY;
    isCursorInCanvas = true;
  });

  window.addEventListener('resize', resize);
  resize();
  animate(0);
})();
</script>
</body>
</html>
