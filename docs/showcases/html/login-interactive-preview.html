<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Interactive Cursor Motion</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-base: #0c0f1a;
  --bg-surface: #121625;
  --accent-300: #d8b4fe;
  --accent-400: #c084fc;
  --accent-500: #a855f7;
  --accent-600: #8b5cf6;
  --accent-700: #7c3aed;
  --text-primary: #f1f5f9;
  --text-muted: #94a3b8;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-base);
  min-height: 100vh;
  display: flex;
}

.container {
  display: flex;
  width: 100%;
  min-height: 100vh;
}

/* LEFT SIDE - Login Form */
.login-side {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: var(--bg-base);
}

.login-form {
  width: 100%;
  max-width: 360px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 2.5rem;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--accent-500), var(--accent-300));
  border-radius: 10px;
}

.logo-text {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text-primary);
}

.login-title {
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
}

.login-subtitle {
  color: var(--text-muted);
  margin-bottom: 2rem;
  font-size: 0.9rem;
}

.form-group {
  margin-bottom: 1.25rem;
}

.form-label {
  display: block;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
}

.form-input {
  width: 100%;
  padding: 0.75rem 1rem;
  background: var(--bg-surface);
  border: 1px solid #1e293b;
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 0.95rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-input:focus {
  outline: none;
  border-color: var(--accent-500);
  box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
}

.form-input::placeholder {
  color: #475569;
}

.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  font-size: 0.85rem;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--text-muted);
  cursor: pointer;
}

.remember-me input {
  accent-color: var(--accent-500);
}

.forgot-link {
  color: var(--accent-400);
  text-decoration: none;
  transition: color 0.2s;
}

.forgot-link:hover {
  color: var(--accent-300);
}

.btn-primary {
  width: 100%;
  padding: 0.85rem;
  background: linear-gradient(135deg, var(--accent-500), #9333ea);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
}

.divider {
  display: flex;
  align-items: center;
  margin: 1.5rem 0;
  color: var(--text-muted);
  font-size: 0.8rem;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #1e293b;
}

.divider span {
  padding: 0 1rem;
}

.signup-text {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.signup-link {
  color: var(--accent-400);
  text-decoration: none;
}

.signup-link:hover {
  color: var(--accent-300);
}

/* RIGHT SIDE - Interactive Canvas */
.canvas-side {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: radial-gradient(ellipse at 40% 40%, #1a1f35 0%, var(--bg-base) 70%);
}

#interactive-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: crosshair;
}

.canvas-hint {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(148, 163, 184, 0.5);
  font-size: 0.8rem;
  text-align: center;
  pointer-events: none;
  transition: opacity 0.3s;
}

.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 130% 130% at center, transparent 35%, rgba(12, 15, 26, 0.5) 100%);
  pointer-events: none;
}

/* Responsive */
@media (max-width: 900px) {
  .canvas-side {
    display: none;
  }
  .login-side {
    justify-content: center;
  }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .btn-primary:hover {
    transform: none;
  }
}
</style>
</head>
<body>
<div class="container">
  <!-- LEFT: Login Form -->
  <div class="login-side">
    <form class="login-form">
      <div class="logo">
        <div class="logo-icon"></div>
        <span class="logo-text">Planner</span>
      </div>

      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to continue to your workspace</p>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter your password">
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox">
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary">Sign in</button>

      <div class="divider">
        <span>or</span>
      </div>

      <p class="signup-text">
        Don't have an account? <a href="#" class="signup-link">Create one</a>
      </p>
    </form>
  </div>

  <!-- RIGHT: Interactive Canvas -->
  <div class="canvas-side">
    <canvas id="interactive-canvas"></canvas>
    <div class="canvas-hint">Move your cursor to interact</div>
    <div class="vignette"></div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('interactive-canvas');
  const ctx = canvas.getContext('2d');
  const hint = document.querySelector('.canvas-hint');

  // Configuration
  const CONFIG = {
    numCircles: 10,
    numArcs: 6,
    circleRadiusRange: [60, 150],
    interactionRadius: 220,
    friction: 0.94,
    returnForce: 0.008,
    ambientWaveSpeed: 0.0008,
    ambientWaveAmplitude: 0.5,
    cursorInfluence: 0.6,
    minSpeed: 0,
    maxSpeed: 8,
    // Color mapping: speed -> hue
    slowHue: 38,      // Orange/yellow
    mediumHue: 285,   // Purple
    fastHue: 235      // Blue
  };

  // State
  let elements = [];
  let arcs = [];
  let cursorX = 0;
  let cursorY = 0;
  let prevCursorX = 0;
  let prevCursorY = 0;
  let cursorVx = 0;
  let cursorVy = 0;
  let cursorSpeed = 0;
  let isCursorInCanvas = false;
  let animationId = null;
  let lastTime = 0;
  let hintVisible = true;

  // Element class
  class Element {
    constructor(x, y, radius, type = 'circle') {
      this.x = x;
      this.y = y;
      this.originX = x;
      this.originY = y;
      this.vx = 0;
      this.vy = 0;
      this.radius = radius;
      this.type = type;
      this.hue = CONFIG.slowHue;
      this.targetHue = CONFIG.slowHue;
      this.phase = Math.random() * Math.PI * 2;
      this.waveOffsetX = (Math.random() - 0.5) * 100;
      this.waveOffsetY = (Math.random() - 0.5) * 100;
    }

    update(time) {
      // Calculate speed
      const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);

      // Map speed to hue
      // Slow (0-1): Orange (38)
      // Medium (1-4): Purple (285)
      // Fast (4+): Blue (235)
      let newHue;
      if (speed < 1) {
        newHue = CONFIG.slowHue;
      } else if (speed < 4) {
        // Interpolate between slow and medium
        const t = (speed - 1) / 3;
        newHue = CONFIG.slowHue + (CONFIG.mediumHue - CONFIG.slowHue) * t;
        // Handle hue wrapping (going from 38 to 285, go through 0)
        if (newHue > 180) {
          newHue = CONFIG.slowHue + (360 - CONFIG.slowHue + CONFIG.mediumHue) * t;
          if (newHue > 360) newHue -= 360;
        }
      } else {
        // Interpolate between medium and fast
        const t = Math.min((speed - 4) / 4, 1);
        newHue = CONFIG.mediumHue + (CONFIG.fastHue - CONFIG.mediumHue) * t;
      }

      // Smooth hue transition
      this.targetHue = newHue;
      this.hue += (this.targetHue - this.hue) * 0.08;

      // Apply friction
      this.vx *= CONFIG.friction;
      this.vy *= CONFIG.friction;

      // Return force to origin (with wave motion when idle)
      const waveTime = time * CONFIG.ambientWaveSpeed;
      const targetX = this.originX + Math.sin(waveTime + this.phase) * CONFIG.ambientWaveAmplitude * this.radius * 0.1 + this.waveOffsetX * 0.05;
      const targetY = this.originY + Math.cos(waveTime + this.phase * 1.3) * CONFIG.ambientWaveAmplitude * this.radius * 0.08;

      this.vx += (targetX - this.x) * CONFIG.returnForce;
      this.vy += (targetY - this.y) * CONFIG.returnForce;

      // Update position
      this.x += this.vx;
      this.y += this.vy;
    }

    draw(ctx) {
      const gradient = ctx.createRadialGradient(
        this.x, this.y, 0,
        this.x, this.y, this.radius
      );

      // Normalize hue for HSL
      const normalizedHue = ((this.hue % 360) + 360) % 360;

      gradient.addColorStop(0, `hsla(${normalizedHue}, 75%, 65%, 0.9)`);
      gradient.addColorStop(0.4, `hsla(${normalizedHue}, 70%, 55%, 0.5)`);
      gradient.addColorStop(0.7, `hsla(${normalizedHue}, 65%, 45%, 0.25)`);
      gradient.addColorStop(1, `hsla(${normalizedHue}, 60%, 35%, 0)`);

      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
    }
  }

  // Arc class
  class Arc {
    constructor(x1, y1, cx, cy, x2, y2, strokeWidth) {
      this.x1 = x1;
      this.y1 = y1;
      this.cx = cx;
      this.cy = cy;
      this.x2 = x2;
      this.y2 = y2;
      this.strokeWidth = strokeWidth;
      this.originX1 = x1;
      this.originY1 = y1;
      this.originCx = cx;
      this.originCy = cy;
      this.originX2 = x2;
      this.originY2 = y2;
      this.vx = 0;
      this.vy = 0;
      this.hue = CONFIG.slowHue;
      this.phase = Math.random() * Math.PI * 2;
    }

    update(time) {
      // Average velocity from control points
      const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);

      // Map speed to hue (same as circles)
      let newHue;
      if (speed < 1) {
        newHue = CONFIG.slowHue;
      } else if (speed < 4) {
        const t = (speed - 1) / 3;
        newHue = CONFIG.slowHue + (360 - CONFIG.slowHue + CONFIG.mediumHue) * t;
        if (newHue > 360) newHue -= 360;
      } else {
        const t = Math.min((speed - 4) / 4, 1);
        newHue = CONFIG.mediumHue + (CONFIG.fastHue - CONFIG.mediumHue) * t;
      }

      this.targetHue = newHue;
      this.hue += (this.targetHue - this.hue) * 0.08;

      // Apply friction
      this.vx *= CONFIG.friction;
      this.vy *= CONFIG.friction;

      // Return force with wave motion
      const waveTime = time * CONFIG.ambientWaveSpeed;
      const waveX = Math.sin(waveTime + this.phase) * 15;
      const waveY = Math.cos(waveTime + this.phase * 1.5) * 12;

      const targetX1 = this.originX1 + waveX;
      const targetY1 = this.originY1 + waveY;
      const targetCx = this.originCx + waveX * 1.2;
      const targetCy = this.originCy + waveY * 1.2;
      const targetX2 = this.originX2 + waveX * 0.8;
      const targetY2 = this.originY2 + waveY * 0.8;

      this.x1 += (targetX1 - this.x1) * CONFIG.returnForce + this.vx;
      this.y1 += (targetY1 - this.y1) * CONFIG.returnForce + this.vy;
      this.cx += (targetCx - this.cx) * CONFIG.returnForce + this.vx * 0.8;
      this.cy += (targetCy - this.cy) * CONFIG.returnForce + this.vy * 0.8;
      this.x2 += (targetX2 - this.x2) * CONFIG.returnForce + this.vx * 0.6;
      this.y2 += (targetY2 - this.y2) * CONFIG.returnForce + this.vy * 0.6;
    }

    draw(ctx) {
      const normalizedHue = ((this.hue % 360) + 360) % 360;

      const gradient = ctx.createLinearGradient(this.x1, this.y1, this.x2, this.y2);
      gradient.addColorStop(0, `hsla(${normalizedHue}, 70%, 60%, 0)`);
      gradient.addColorStop(0.3, `hsla(${normalizedHue}, 75%, 65%, 0.6)`);
      gradient.addColorStop(0.7, `hsla(${normalizedHue}, 70%, 60%, 0.5)`);
      gradient.addColorStop(1, `hsla(${normalizedHue}, 65%, 55%, 0)`);

      ctx.beginPath();
      ctx.moveTo(this.x1, this.y1);
      ctx.quadraticCurveTo(this.cx, this.cy, this.x2, this.y2);
      ctx.strokeStyle = gradient;
      ctx.lineWidth = this.strokeWidth;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
  }

  // Initialize elements
  function initElements() {
    elements = [];
    arcs = [];

    const width = canvas.width;
    const height = canvas.height;

    // Create circles
    for (let i = 0; i < CONFIG.numCircles; i++) {
      const radius = CONFIG.circleRadiusRange[0] + Math.random() * (CONFIG.circleRadiusRange[1] - CONFIG.circleRadiusRange[0]);
      const x = radius + Math.random() * (width - radius * 2);
      const y = radius + Math.random() * (height - radius * 2);
      elements.push(new Element(x, y, radius, 'circle'));
    }

    // Create arcs
    for (let i = 0; i < CONFIG.numArcs; i++) {
      const x1 = Math.random() * width;
      const y1 = Math.random() * height;
      const x2 = Math.random() * width;
      const y2 = Math.random() * height;
      const cx = (x1 + x2) / 2 + (Math.random() - 0.5) * 150;
      const cy = (y1 + y2) / 2 + (Math.random() - 0.5) * 150;
      const strokeWidth = 20 + Math.random() * 25;
      arcs.push(new Arc(x1, y1, cx, cy, x2, y2, strokeWidth));
    }
  }

  // Resize handler
  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    initElements();
  }

  // Apply cursor force to elements
  function applyCursorForce() {
    if (!isCursorInCanvas) return;

    elements.forEach(el => {
      const dx = cursorX - el.x;
      const dy = cursorY - el.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < CONFIG.interactionRadius && dist > 0) {
        // Force decreases with distance
        const force = (CONFIG.interactionRadius - dist) / CONFIG.interactionRadius;
        // Apply cursor velocity with some lag
        el.vx += cursorVx * force * CONFIG.cursorInfluence;
        el.vy += cursorVy * force * CONFIG.cursorInfluence;

        // Add slight repulsion
        const repulsionStrength = 0.5;
        el.vx -= (dx / dist) * force * repulsionStrength;
        el.vy -= (dy / dist) * force * repulsionStrength;
      }
    });

    // Apply to arcs (based on control point proximity)
    arcs.forEach(arc => {
      const midX = (arc.x1 + arc.x2) / 2;
      const midY = (arc.y1 + arc.y2) / 2;
      const dx = cursorX - midX;
      const dy = cursorY - midY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < CONFIG.interactionRadius && dist > 0) {
        const force = (CONFIG.interactionRadius - dist) / CONFIG.interactionRadius;
        arc.vx += cursorVx * force * CONFIG.cursorInfluence * 0.7;
        arc.vy += cursorVy * force * CONFIG.cursorInfluence * 0.7;
      }
    });
  }

  // Animation loop
  function animate(currentTime) {
    const deltaTime = currentTime - lastTime;
    lastTime = currentTime;

    // Clear canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Update cursor velocity
    cursorVx = (cursorX - prevCursorX) * 0.8;
    cursorVy = (cursorY - prevCursorY) * 0.8;
    prevCursorX = cursorX;
    prevCursorY = cursorY;

    // Apply forces
    applyCursorForce();

    // Update and draw arcs (behind circles)
    arcs.forEach(arc => {
      arc.update(currentTime);
      arc.draw(ctx);
    });

    // Update and draw circles
    elements.forEach(el => {
      el.update(currentTime);
      el.draw(ctx);
    });

    // Clamp velocities
    elements.forEach(el => {
      const speed = Math.sqrt(el.vx * el.vx + el.vy * el.vy);
      if (speed > CONFIG.maxSpeed) {
        el.vx = (el.vx / speed) * CONFIG.maxSpeed;
        el.vy = (el.vy / speed) * CONFIG.maxSpeed;
      }
    });

    animationId = requestAnimationFrame(animate);
  }

  // Event listeners
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    cursorX = e.clientX - rect.left;
    cursorY = e.clientY - rect.top;
    isCursorInCanvas = true;

    // Hide hint after first interaction
    if (hintVisible) {
      hint.style.opacity = '0';
      hintVisible = false;
    }
  });

  canvas.addEventListener('mouseleave', () => {
    isCursorInCanvas = false;
  });

  canvas.addEventListener('mouseenter', () => {
    const rect = canvas.getBoundingClientRect();
    prevCursorX = cursorX;
    prevCursorY = cursorY;
    isCursorInCanvas = true;
  });

  // Touch support
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    cursorX = touch.clientX - rect.left;
    cursorY = touch.clientY - rect.top;
    isCursorInCanvas = true;

    if (hintVisible) {
      hint.style.opacity = '0';
      hintVisible = false;
    }
  }, { passive: false });

  canvas.addEventListener('touchend', () => {
    isCursorInCanvas = false;
  });

  // Initialize
  window.addEventListener('resize', resize);
  resize();
  animate(0);
})();
</script>
</body>
</html>
