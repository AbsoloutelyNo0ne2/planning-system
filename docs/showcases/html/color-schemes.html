<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>Prios Color Schemes - 10 Options</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #0a0a0f;
  color: #f1f5f9;
  padding: 40px 20px;
}
h1 { text-align: center; margin-bottom: 40px; font-size: 2rem; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  max-width: 1600px;
  margin: 0 auto;
}
.option {
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid;
}
.preview {
  padding: 20px;
  min-height: 200px;
}
.preview h3 {
  font-size: 0.9rem;
  margin-bottom: 16px;
  opacity: 0.8;
}
.swatches {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.swatch {
  height: 48px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.1);
}
.sample-ui {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.btn {
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 0.8rem;
  font-weight: 500;
  border: none;
  cursor: pointer;
}
.badge {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 0.7rem;
  font-weight: 600;
  align-self: flex-start;
}
.input {
  padding: 10px 12px;
  border-radius: 6px;
  border: 1px solid;
  font-size: 0.85rem;
  width: 100%;
}
