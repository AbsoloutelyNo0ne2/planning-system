<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Planning System</title>
  <style>
    :root {
      --bg-base: #0a1419;
      --bg-surface: #0f1b22;
      --accent-500: #06b6d4;
      --accent-300: #67e8f9;
      --text-primary: #e2e8f0;
      --text-muted: #5eead4;
      --grid-color: rgba(94, 234, 212, 0.04);
      --node-inactive: rgba(94, 234, 212, 0.15);
      --node-active: rgba(6, 182, 212, 0.7);
      --line-color: rgba(94, 234, 212, 0.12);
      --line-active: rgba(6, 182, 212, 0.35);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      min-height: 100vh;
    }

    /* LEFT HALF - Login Form (EXACTLY 50%) */
    .login-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-surface);
      position: relative;
      z-index: 10;
    }

    .login-form {
      width: 100%;
      max-width: 340px;
      padding: 2rem;
    }

    .login-title {
      font-size: 1.625rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .login-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 2.25rem;
      opacity: 0.8;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      opacity: 0.7;
    }

    .form-input {
      width: 100%;
      padding: 0.8125rem 0.875rem;
      font-size: 0.9375rem;
      background: var(--bg-base);
      border: 1px solid rgba(94, 234, 212, 0.15);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-input:focus {
      border-color: var(--accent-500);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
    }

    .form-input::placeholder {
      color: rgba(94, 234, 212, 0.35);
    }

    .login-button {
      width: 100%;
      padding: 0.875rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      background: var(--accent-500);
      color: var(--bg-base);
      border: none;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s ease;
      margin-top: 0.25rem;
    }

    .login-button:hover {
      background: var(--accent-300);
    }

    .login-button:active {
      transform: translateY(1px);
    }

    .login-button:focus {
      outline: 2px solid var(--accent-300);
      outline-offset: 2px;
    }

    .login-hint {
      margin-top: 1.75rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.6;
      text-align: center;
    }

    /* RIGHT HALF - Schematic (EXACTLY 50%) */
    .schematic-panel {
      position: relative;
      overflow: hidden;
      background: var(--bg-base);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #schematic-svg {
      width: 100%;
      height: 100%;
    }

    /* Grid pattern */
    .grid-line {
      stroke: var(--grid-color);
      stroke-width: 1;
    }

    /* Connections */
    .connection {
      stroke: var(--line-color);
      stroke-width: 1;
      fill: none;
    }

    .connection-active {
      stroke: var(--line-active);
      stroke-width: 1.5;
      fill: none;
    }

    /* Nodes */
    .node-circle {
      fill: var(--node-inactive);
      stroke: rgba(94, 234, 212, 0.3);
      stroke-width: 1;
    }

    .node-square {
      fill: var(--node-inactive);
      stroke: rgba(94, 234, 212, 0.3);
      stroke-width: 1;
    }

    .node-accent {
      fill: var(--node-active);
      stroke: var(--accent-500);
      stroke-width: 1.5;
    }

    .node-core {
      fill: var(--accent-500);
    }

    .node-core-bright {
      fill: var(--accent-300);
    }

    /* Pulse animations */
    @keyframes pulse-glow {
      0%, 100% {
        opacity: 0.3;
        filter: drop-shadow(0 0 2px rgba(6, 182, 212, 0.2));
      }
      50% {
        opacity: 0.8;
        filter: drop-shadow(0 0 12px rgba(6, 182, 212, 0.5));
      }
    }

    @keyframes pulse-subtle {
      0%, 100% {
        opacity: 0.2;
      }
      50% {
        opacity: 0.5;
      }
    }

    @keyframes line-flow {
      0% {
        stroke-dashoffset: 20;
      }
      100% {
        stroke-dashoffset: 0;
      }
    }

    @keyframes core-pulse {
      0%, 100% {
        r: 4;
        opacity: 0.8;
      }
      50% {
        r: 5;
        opacity: 1;
      }
    }

    .node-pulse {
      animation: pulse-glow 3s ease-in-out infinite;
    }

    .node-pulse-slow {
      animation: pulse-subtle 4s ease-in-out infinite;
    }

    .connection-flow {
      stroke-dasharray: 4 6;
      animation: line-flow 1.5s linear infinite;
    }

    .connection-flow-slow {
      stroke-dasharray: 3 8;
      animation: line-flow 2.5s linear infinite;
    }

    .core-pulse {
      animation: core-pulse 2s ease-in-out infinite;
    }

    /* Staggered delays */
    .delay-1 { animation-delay: 0s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.8s; }
    .delay-4 { animation-delay: 1.2s; }
    .delay-5 { animation-delay: 1.6s; }
    .delay-6 { animation-delay: 2s; }

    /* Responsive */
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .schematic-panel {
        order: 1;
        min-height: 50vh;
      }

      .login-panel {
        order: 2;
        padding: 3rem 0;
      }

      .schematic-panel {
        opacity: 0.7;
      }

      .schematic-panel::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 40%;
        background: linear-gradient(to top, var(--bg-surface), transparent);
        pointer-events: none;
      }
    }

    @media (max-width: 480px) {
      .login-form {
        padding: 1.5rem;
      }

      .login-title {
        font-size: 1.375rem;
      }

      .schematic-panel {
        min-height: 35vh;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .node-pulse,
      .node-pulse-slow,
      .connection-flow,
      .connection-flow-slow,
      .core-pulse {
        animation: none;
      }

      .node-pulse,
      .node-pulse-slow {
        opacity: 0.4;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- LEFT 50%: Login Form -->
    <div class="login-panel">
      <form class="login-form" onsubmit="return false;">
        <h1 class="login-title">Planning System</h1>
        <p class="login-subtitle">Enter your passphrase to continue</p>

        <div class="form-group">
          <label class="form-label" for="passphrase">Passphrase</label>
          <input
            type="password"
            id="passphrase"
            class="form-input"
            placeholder="Enter passphrase"
            autocomplete="current-password"
          >
        </div>

        <button type="submit" class="login-button">Login</button>

        <p class="login-hint">Secure passphrase-based authentication</p>
      </form>
    </div>

    <!-- RIGHT 50%: Technical Schematic SVG -->
    <div class="schematic-panel">
      <svg id="schematic-svg" viewBox="0 0 500 600" preserveAspectRatio="xMidYMid meet">
        <defs>
          <!-- Grid pattern -->
          <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M 50 0 L 0 0 0 50" fill="none" class="grid-line"/>
          </pattern>

          <!-- Gradient for key nodes -->
          <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- Grid background -->
        <rect width="100%" height="100%" fill="url(#grid)"/>

        <!-- Connection lines -->
        <g class="connections">
          <!-- Central vertical spine -->
          <path d="M 250 50 L 250 130" class="connection-active connection-flow delay-1"/>
          <path d="M 250 130 L 250 230" class="connection-active connection-flow delay-2"/>
          <path d="M 250 230 L 250 330" class="connection-active connection-flow delay-3"/>
          <path d="M 250 330 L 250 430" class="connection connection-flow-slow delay-4"/>
          <path d="M 250 430 L 250 550" class="connection connection-flow-slow delay-5"/>

          <!-- Left branch structure -->
          <path d="M 250 130 L 130 180" class="connection connection-flow-slow delay-2"/>
          <path d="M 130 180 L 80 280" class="connection delay-3"/>
          <path d="M 130 180 L 130 280" class="connection delay-4"/>
          <path d="M 80 280 L 80 380" class="connection connection-flow-slow delay-5"/>
          <path d="M 130 280 L 180 380" class="connection delay-6"/>

          <!-- Right branch structure -->
          <path d="M 250 230 L 370 280" class="connection connection-flow-slow delay-2"/>
          <path d="M 370 280 L 420 380" class="connection delay-3"/>
          <path d="M 370 280 L 370 380" class="connection delay-4"/>
          <path d="M 420 380 L 420 480" class="connection connection-flow-slow delay-5"/>

          <!-- Cross connections -->
          <path d="M 80 380 L 180 430" class="connection delay-4"/>
          <path d="M 180 380 L 250 430" class="connection-active connection-flow delay-3"/>
          <path d="M 370 380 L 320 430" class="connection delay-5"/>
          <path d="M 320 430 L 250 430" class="connection delay-6"/>

          <!-- Lower branches -->
          <path d="M 250 430 L 150 500" class="connection delay-5"/>
          <path d="M 250 430 L 350 500" class="connection delay-6"/>
        </g>

        <!-- Nodes -->
        <g class="nodes">
          <!-- Entry node (top) - KEY NODE -->
          <g class="node-pulse delay-1">
            <circle cx="250" cy="50" r="14" class="node-accent"/>
            <circle cx="250" cy="50" r="6" class="node-core-bright core-pulse"/>
          </g>

          <!-- Level 1: Main branch point - KEY NODE -->
          <g class="node-pulse delay-2">
            <circle cx="250" cy="130" r="11" class="node-accent"/>
            <circle cx="250" cy="130" r="4" class="node-core"/>
          </g>

          <!-- Level 1: Left branch -->
          <g class="node-pulse-slow delay-3">
            <rect x="120" y="170" width="20" height="20" class="node-square"/>
            <rect x="127" y="177" width="6" height="6" class="node-core"/>
          </g>

          <!-- Level 2: Central node - KEY NODE -->
          <g class="node-pulse delay-3">
            <circle cx="250" cy="230" r="11" class="node-accent"/>
            <circle cx="250" cy="230" r="4" class="node-core core-pulse"/>
          </g>

          <!-- Level 2: Left branches -->
          <g class="node-pulse-slow delay-4">
            <circle cx="80" cy="280" r="8" class="node-circle"/>
            <circle cx="80" cy="280" r="3" class="node-core"/>
          </g>

          <g class="node-pulse-slow delay-5">
            <rect x="120" y="270" width="20" height="20" class="node-square"/>
          </g>

          <!-- Level 2: Right branch -->
          <g class="node-pulse-slow delay-3">
            <rect x="360" y="270" width="20" height="20" class="node-square"/>
            <rect x="367" y="277" width="6" height="6" class="node-core"/>
          </g>

          <!-- Level 3: Central -->
          <g class="node-pulse delay-4">
            <circle cx="250" cy="330" r="9" class="node-circle"/>
            <circle cx="250" cy="330" r="3" class="node-core"/>
          </g>

          <!-- Level 3: Left side -->
          <g class="node-pulse-slow delay-5">
            <circle cx="80" cy="380" r="7" class="node-circle"/>
          </g>

          <g class="node-pulse-slow delay-6">
            <circle cx="130" cy="280" r="6" class="node-circle"/>
          </g>

          <g class="node-pulse-slow delay-4">
            <rect x="170" y="370" width="20" height="20" class="node-square"/>
          </g>

          <!-- Level 3: Right side -->
          <g class="node-pulse-slow delay-4">
            <circle cx="420" cy="380" r="8" class="node-circle"/>
            <circle cx="420" cy="380" r="3" class="node-core"/>
          </g>

          <g class="node-pulse-slow delay-5">
            <rect x="360" y="370" width="20" height="20" class="node-square"/>
          </g>

          <!-- Level 4: Merge point -->
          <g class="node-pulse delay-5">
            <circle cx="250" cy="430" r="10" class="node-circle"/>
            <circle cx="250" cy="430" r="4" class="node-core"/>
          </g>

          <!-- Level 4: Side nodes -->
          <g class="node-pulse-slow delay-5">
            <circle cx="180" cy="380" r="7" class="node-circle"/>
          </g>

          <g class="node-pulse-slow delay-6">
            <circle cx="320" cy="430" r="6" class="node-circle"/>
          </g>

          <!-- Level 5: Lower branches -->
          <g class="node-pulse-slow delay-5">
            <rect x="140" y="490" width="20" height="20" class="node-square"/>
          </g>

          <g class="node-pulse-slow delay-6">
            <rect x="340" y="490" width="20" height="20" class="node-square"/>
          </g>

          <!-- Terminal node (bottom) -->
          <g class="node-pulse delay-6">
            <circle cx="250" cy="550" r="12" class="node-circle"/>
            <circle cx="250" cy="550" r="5" class="node-core"/>
          </g>

          <!-- Additional cross-connection nodes -->
          <g class="node-pulse-slow delay-4">
            <circle cx="180" cy="430" r="5" class="node-circle"/>
          </g>

          <g class="node-pulse-slow delay-5">
            <circle cx="420" cy="480" r="6" class="node-circle"/>
          </g>
        </g>
      </svg>
    </div>
  </div>
</body>
</html>
