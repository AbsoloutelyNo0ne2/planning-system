<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Motion Wave</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-base: #0c0f1a;
  --bg-surface: #121625;
  --accent-500: #a855f7;
  --accent-400: #c084fc;
  --accent-300: #d8b4fe;
  --text-primary: #f1f5f9;
  --text-muted: #94a3b8;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-base);
  min-height: 100vh;
  display: flex;
}

.container {
  display: flex;
  width: 100%;
  min-height: 100vh;
}

/* LEFT SIDE - Login Form */
.login-side {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: var(--bg-base);
}

.login-form {
  width: 100%;
  max-width: 360px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 2.5rem;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--accent-500), var(--accent-300));
  border-radius: 10px;
}

.logo-text {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text-primary);
}

.login-title {
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
}

.login-subtitle {
  color: var(--text-muted);
  margin-bottom: 2rem;
  font-size: 0.9rem;
}

.form-group {
  margin-bottom: 1.25rem;
}

.form-label {
  display: block;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
}

.form-input {
  width: 100%;
  padding: 0.75rem 1rem;
  background: var(--bg-surface);
  border: 1px solid #1e293b;
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 0.95rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-input:focus {
  outline: none;
  border-color: var(--accent-500);
  box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
}

.form-input::placeholder {
  color: #475569;
}

.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  font-size: 0.85rem;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--text-muted);
  cursor: pointer;
}

.remember-me input {
  accent-color: var(--accent-500);
}

.forgot-link {
  color: var(--accent-400);
  text-decoration: none;
  transition: color 0.2s;
}

.forgot-link:hover {
  color: var(--accent-300);
}

.btn-primary {
  width: 100%;
  padding: 0.85rem;
  background: linear-gradient(135deg, var(--accent-500), #9333ea);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
}

.divider {
  display: flex;
  align-items: center;
  margin: 1.5rem 0;
  color: var(--text-muted);
  font-size: 0.8rem;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #1e293b;
}

.divider span {
  padding: 0 1rem;
}

.signup-text {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.signup-link {
  color: var(--accent-400);
  text-decoration: none;
}

.signup-link:hover {
  color: var(--accent-300);
}

/* RIGHT SIDE - Heavy Blurred Schematic with Wave Motion */
.schematic-side {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg-base);
}

/* Schematic container */
.schematic-wrapper {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ============================================
WAVE ANIMATIONS - Intense diagonal ocean swell
============================================ */

/* Base layer - slowest, largest wave with diagonal movement */
@keyframes wave-base {
0% { transform: translate(0, 0); }
25% { transform: translate(60px, -30px); }
50% { transform: translate(80px, 40px); }
75% { transform: translate(20px, -25px); }
100% { transform: translate(0, 0); }
}

/* Medium layer - medium speed wave with diagonal movement */
@keyframes wave-medium {
0% { transform: translate(0, 0); }
30% { transform: translate(-40px, 20px); }
60% { transform: translate(50px, -25px); }
100% { transform: translate(0, 0); }
}

/* Sharp layer - fastest wave with diagonal movement */
@keyframes wave-sharp {
0% { transform: translate(0, 0); }
33% { transform: translate(25px, -15px); }
66% { transform: translate(-20px, 10px); }
100% { transform: translate(0, 0); }
}

/* Glow wave - counter flow with position shift */
@keyframes wave-glow {
0%, 100% { transform: translate(0, 0); }
50% { transform: translate(-40px, 20px); }
}

/* BASE LAYER - Maximum blur, full opacity */
.schematic-layer-base {
position: absolute;
inset: -120px;
filter: blur(60px) saturate(1.3);
opacity: 1;
animation: wave-base 20s ease-in-out infinite;
}

/* MEDIUM LAYER - Medium blur, gradient masked */
.schematic-layer-medium {
position: absolute;
inset: -80px;
filter: blur(35px) saturate(1.2);
opacity: 0.7;
animation: wave-medium 16s ease-in-out infinite;
animation-delay: 2s;
mask-image: radial-gradient(
ellipse 80% 80% at center,
black 20%,
transparent 80%
);
-webkit-mask-image: radial-gradient(
ellipse 80% 80% at center,
black 20%,
transparent 80%
);
}

/* SHARP LAYER - Minimal blur, very transparent */
.schematic-layer-sharp {
position: absolute;
inset: -30px;
filter: blur(2px);
opacity: 0.15;
animation: wave-sharp 12s ease-in-out infinite;
animation-delay: 4s;
mask-image: radial-gradient(
ellipse 60% 60% at center,
black 0%,
transparent 60%
);
-webkit-mask-image: radial-gradient(
ellipse 60% 60% at center,
black 0%,
transparent 60%
);
}

/* The actual schematic SVG - removed, using updated sizing below */

/* Ambient glow overlay - intensified and position-shifting */
@keyframes glow-shift-1 {
0%, 100% {
background: radial-gradient(
ellipse 60% 60% at 30% 30%,
rgba(168, 85, 247, 0.12) 0%,
transparent 60%
);
}
50% {
background: radial-gradient(
ellipse 70% 70% at 70% 60%,
rgba(168, 85, 247, 0.15) 0%,
transparent 70%
);
}
}

@keyframes glow-shift-2 {
0%, 100% {
background: radial-gradient(
ellipse 70% 70% at 70% 70%,
rgba(192, 132, 252, 0.1) 0%,
transparent 70%
);
}
50% {
background: radial-gradient(
ellipse 80% 80% at 25% 40%,
rgba(192, 132, 252, 0.12) 0%,
transparent 80%
);
}
}

.ambient-glow {
position: absolute;
inset: 0;
background: radial-gradient(
ellipse 60% 60% at 30% 30%,
rgba(168, 85, 247, 0.12) 0%,
transparent 60%
);
pointer-events: none;
animation: glow-shift-1 18s ease-in-out infinite;
}

.ambient-glow-2 {
position: absolute;
inset: 0;
background: radial-gradient(
ellipse 70% 70% at 70% 70%,
rgba(192, 132, 252, 0.1) 0%,
transparent 70%
);
pointer-events: none;
animation: glow-shift-2 22s ease-in-out infinite;
}

/* Vignette effect - softer falloff */
.vignette {
position: absolute;
inset: 0;
background: radial-gradient(
ellipse 120% 120% at center,
transparent 40%,
rgba(12, 15, 26, 0.5) 100%
);
pointer-events: none;
}

/* Reduced motion preference */
@media (prefers-reduced-motion: reduce) {
.schematic-layer-base,
.schematic-layer-medium,
.schematic-layer-sharp,
.ambient-glow,
.ambient-glow-2 {
animation: none;
}
}

/* SVG scaling for bigger movement range */
.schematic-svg {
width: 160%;
height: 160%;
max-width: none;
}

/* Responsive */
@media (max-width: 900px) {
  .schematic-side {
    display: none;
  }

  .login-side {
    justify-content: center;
  }
}

/* Mobile motion reduction - slightly less intense */
@media (max-width: 600px) {
.schematic-layer-base {
animation: wave-base 28s ease-in-out infinite;
inset: -80px;
}

.schematic-layer-medium {
animation: wave-medium 24s ease-in-out infinite;
inset: -50px;
}

.schematic-layer-sharp {
animation: none;
}
}
</style>
</head>
<body>
<div class="container">
  <!-- LEFT: Login Form -->
  <div class="login-side">
    <form class="login-form">
      <div class="logo">
        <div class="logo-icon"></div>
        <span class="logo-text">Planner</span>
      </div>

      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to continue to your workspace</p>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="you@example.com"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="Enter your password"

      <div class="form-options">
        <label class="remember-me">

          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>

      <button type="submit" class="btn-primary">Sign in</button>

        <span>or</span>

          <circle cx="500" cy="300" r="18" fill="#c084fc" opacity="0.5"/>

      <!-- MEDIUM LAYER: 35px blur, gradient masked, medium wave -->
      <div class="schematic-layer-medium">

          <defs>

</div>
</body>
</html>
