<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Effect 3: Shimmer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --color-bg-base: #0a0a0f;
  --color-border-default: #2a2a3e;
  --color-text-secondary: #94a3b8;
  --color-text-primary: #f1f5f9;
  --color-accent-500: #8b5cf6;
}
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--color-bg-base);
  color: var(--color-text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
}
h1 { font-size: 1.5rem; color: var(--color-text-secondary); }
.btn-shimmer {
  position: relative;
  padding: 12px 32px;
  border-radius: 6px;
  background: transparent;
  color: var(--color-text-secondary);
  border: 1px solid var(--color-border-default);
  font-weight: 500;
  font-size: 0.9rem;
  cursor: pointer;
  overflow: hidden;
  transition: color 0.3s ease, border-color 0.3s ease;
  z-index: 1;
}
.btn-shimmer::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(
    105deg,
    transparent 0%,
    transparent 40%,
    rgba(139, 92, 246, 0.2) 45%,
    rgba(139, 92, 246, 0.4) 50%,
    rgba(139, 92, 246, 0.2) 55%,
    transparent 60%,
    transparent 100%
  );
  background-size: 200% 100%;
  background-position: var(--shimmer-pos, 100%);
  opacity: 0;
  transition: opacity 0.3s ease, background-position 0.1s ease;
  pointer-events: none;
}
.btn-shimmer:hover::before { opacity: 1; }
.btn-shimmer:hover { color: var(--color-text-primary); border-color: var(--color-accent-500); }
.back { color: var(--color-text-secondary); text-decoration: none; font-size: 0.85rem; }
.back:hover { color: var(--color-accent-500); }
</style>
</head>
<body>
<a href="index.html" class="back">← Back</a>
<h1>Effect 3: Shimmer Sweep</h1>
<button class="btn-shimmer">Logout</button>
<script>
document.querySelectorAll('.btn-shimmer').forEach(btn => {
  btn.addEventListener('mousemove', (e) => {
    const rect = btn.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    btn.style.setProperty('--shimmer-pos', x + '%');
  });
});
</script>
</body>
</html>
