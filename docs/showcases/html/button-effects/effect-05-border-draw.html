<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Effect 5: Border Draw</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --color-bg-base: #0a0a0f;
  --color-border-default: #2a2a3e;
  --color-text-secondary: #94a3b8;
  --color-text-primary: #f1f5f9;
  --color-accent-500: #8b5cf6;
}
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--color-bg-base);
  color: var(--color-text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
}
h1 { font-size: 1.5rem; color: var(--color-text-secondary); }
.btn-border-draw {
  position: relative;
  padding: 12px 32px;
  border-radius: 6px;
  background: transparent;
  color: var(--color-text-secondary);
  border: 1px solid var(--color-border-default);
  font-weight: 500;
  font-size: 0.9rem;
  cursor: pointer;
  overflow: hidden;
  transition: color 0.3s ease;
  z-index: 1;
}
.btn-border-draw::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 8px;
  background: conic-gradient(
    from var(--angle, 0deg),
    transparent 0%,
    transparent 80%,
    rgba(139, 92, 246, 0.8) 100%
  );
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: -1;
  pointer-events: none;
  animation: rotate 2s linear infinite;
}
@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.btn-border-draw:hover::before { opacity: 1; }
.btn-border-draw:hover { color: var(--color-text-primary); }
.back { color: var(--color-text-secondary); text-decoration: none; font-size: 0.85rem; }
.back:hover { color: var(--color-accent-500); }
</style>
</head>
<body>
<a href="index.html" class="back">← Back</a>
<h1>Effect 5: Border Draw + Rotate</h1>
<button class="btn-border-draw">Logout</button>
<script>
document.querySelectorAll('.btn-border-draw').forEach(btn => {
  btn.addEventListener('mousemove', (e) => {
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const angle = Math.atan2(y - rect.height/2, x - rect.width/2) * 180 / Math.PI + 180;
    btn.style.setProperty('--angle', angle + 'deg');
  });
});
</script>
</body>
</html>
