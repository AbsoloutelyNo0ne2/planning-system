<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Fluid Mesh</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-base: #0c0f1a;
  --bg-surface: #121625;
  --accent-300: #d8b4fe;
  --accent-400: #c084fc;
  --accent-500: #a855f7;
  --accent-600: #8b5cf6;
  --accent-700: #7c3aed;
  --text-primary: #f1f5f9;
  --text-muted: #94a3b8;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-base);
  min-height: 100vh;
  display: flex;
}

.container {
  display: flex;
  width: 100%;
  min-height: 100vh;
}

/* LEFT SIDE - Login Form */
.login-side {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: var(--bg-base);
}

.login-form {
  width: 100%;
  max-width: 360px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 2.5rem;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--accent-500), var(--accent-300));
  border-radius: 10px;
}

.logo-text {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text-primary);
}

.login-title {
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
}

.login-subtitle {
  color: var(--text-muted);
  margin-bottom: 2rem;
  font-size: 0.9rem;
}

.form-group {
  margin-bottom: 1.25rem;
}

.form-label {
  display: block;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
}

.form-input {
  width: 100%;
  padding: 0.75rem 1rem;
  background: var(--bg-surface);
  border: 1px solid #1e293b;
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 0.95rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-input:focus {
  outline: none;
  border-color: var(--accent-500);
  box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
}

.form-input::placeholder {
  color: #475569;
}

.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  font-size: 0.85rem;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--text-muted);
  cursor: pointer;
}

.remember-me input {
  accent-color: var(--accent-500);
}

.forgot-link {
  color: var(--accent-400);
  text-decoration: none;
  transition: color 0.2s;
}

.forgot-link:hover {
  color: var(--accent-300);
}

.btn-primary {
  width: 100%;
  padding: 0.85rem;
  background: linear-gradient(135deg, var(--accent-500), #9333ea);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
}

.divider {
  display: flex;
  align-items: center;
  margin: 1.5rem 0;
  color: var(--text-muted);
  font-size: 0.8rem;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #1e293b;
}

.divider span {
  padding: 0 1rem;
}

.signup-text {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.signup-link {
  color: var(--accent-400);
  text-decoration: none;
}

.signup-link:hover {
  color: var(--accent-300);
}

/* RIGHT SIDE - Interactive Canvas */
.canvas-side {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: radial-gradient(ellipse at 40% 40%, #1a1f35 0%, var(--bg-base) 70%);
}

#interactive-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: crosshair;
}

.canvas-hint {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(148, 163, 184, 0.5);
  font-size: 0.8rem;
  text-align: center;
  pointer-events: none;
  transition: opacity 0.3s;
}

.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 130% 130% at center, transparent 35%, rgba(12, 15, 26, 0.5) 100%);
  pointer-events: none;
}

/* Responsive */
@media (max-width: 900px) {
  .canvas-side {
    display: none;
  }
  .login-side {
    justify-content: center;
  }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .btn-primary:hover {
    transform: none;
  }
}
</style>
</head>
<body>
<div class="container">
  <!-- LEFT: Login Form -->
  <div class="login-side">
    <form class="login-form">
      <div class="logo">
        <div class="logo-icon"></div>
        <span class="logo-text">Planner</span>
      </div>

      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to continue to your workspace</p>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter your password">
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox">
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary">Sign in</button>

      <div class="divider">
        <span>or</span>
      </div>

      <p class="signup-text">
        Don't have an account? <a href="#" class="signup-link">Create one</a>
      </p>
    </form>
  </div>

  <!-- RIGHT: Interactive Canvas -->
  <div class="canvas-side">
    <canvas id="interactive-canvas"></canvas>
    <div class="canvas-hint">Move your cursor to interact</div>
    <div class="vignette"></div>
  </div>
</div>

<script>
(function() {
const canvas = document.getElementById('interactive-canvas');
const ctx = canvas.getContext('2d');
const hint = document.querySelector('.canvas-hint');

// Configuration
const CONFIG = {
  gridSize: 8,
  connectionDistance: 150,
  nodeRadius: 4,
  lineWidth: 2,
  
  // Wave parameters
  waveAmplitude: 25,
  waveFrequency: 0.0004,
  waveSpeed: 0.0003,
  
  // Interaction
  interactionRadius: 200,
  friction: 0.92,
  returnForce: 0.004,
  cursorInfluence: 0.08,
  
  // Colors
  baseHue: 280,
  slowTint: 8,
  fastTint: -15,
  baseSaturation: 60,
  baseLightness: 55
};

// State
let nodes = [];
let cursorX = 0;
let cursorY = 0;
let prevCursorX = 0;
let prevCursorY = 0;
let cursorVx = 0;
let cursorVy = 0;
let cursorSpeed = 0;
let isCursorInCanvas = false;
let lastTime = 0;
let hintVisible = true;

// Map speed to hue tint
function mapSpeedToTint(speed) {
  if (speed < 0.5) {
    return CONFIG.baseHue + CONFIG.slowTint;
  } else if (speed < 2) {
    const t = (speed - 0.5) / 1.5;
    return CONFIG.baseHue + CONFIG.slowTint - (CONFIG.slowTint * t);
  } else {
    const t = Math.min((speed - 2) / 4, 1);
    return CONFIG.baseHue + (CONFIG.fastTint * t);
  }
}

// Mesh Node class
class MeshNode {
  constructor(x, y) {
    this.baseX = x;
    this.baseY = y;
    this.x = x;
    this.y = y;
    this.vx = 0;
    this.vy = 0;
    this.phase = Math.random() * Math.PI * 2;
    this.wavePhase = Math.random() * Math.PI * 2;
    this.hue = CONFIG.baseHue;
    this.targetHue = CONFIG.baseHue;
  }
  
  update(time, cursorX, cursorY, cursorVx, cursorVy, isCursorActive) {
    // Calculate speed
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    
    // Update color
    this.targetHue = mapSpeedToTint(speed);
    this.hue = this.hue + (this.targetHue - this.hue) * 0.05;
    
    // Apply friction
    this.vx *= CONFIG.friction;
    this.vy *= CONFIG.friction;
    
    // Wave motion - creates liquid ripple effect
    const waveTime = time * CONFIG.waveSpeed;
    const waveX = Math.sin(waveTime + this.wavePhase) * CONFIG.waveAmplitude;
    const waveY = Math.cos(waveTime * 0.8 + this.wavePhase * 1.3) * CONFIG.waveAmplitude * 0.7;
    
    // Secondary wave for more organic motion
    const wave2X = Math.sin(waveTime * 1.5 + this.phase) * CONFIG.waveAmplitude * 0.4;
    const wave2Y = Math.cos(waveTime * 1.2 + this.phase * 0.7) * CONFIG.waveAmplitude * 0.3;
    
    const targetX = this.baseX + waveX + wave2X;
    const targetY = this.baseY + waveY + wave2Y;
    
    // Return force
    this.vx += (targetX - this.x) * CONFIG.returnForce;
    this.vy += (targetY - this.y) * CONFIG.returnForce;
    
    // Cursor interaction
    if (isCursorActive) {
      const dx = cursorX - this.x;
      const dy = cursorY - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < CONFIG.interactionRadius && dist > 0) {
        const force = (CONFIG.interactionRadius - dist) / CONFIG.interactionRadius;
        
        // Gentle push from cursor
        this.vx += cursorVx * force * CONFIG.cursorInfluence;
        this.vy += cursorVy * force * CONFIG.cursorInfluence;
        
        // Slight repulsion
        this.vx -= (dx / dist) * force * 0.1;
        this.vy -= (dy / dist) * force * 0.1;
      }
    }
    
    // Update position
    this.x += this.vx;
    this.y += this.vy;
  }
  
  draw(ctx) {
    const normalizedHue = ((this.hue % 360) + 360) % 360;
    
    // Draw node as soft circle
    const gradient = ctx.createRadialGradient(
      this.x, this.y, 0,
      this.x, this.y, CONFIG.nodeRadius * 3
    );
    
    gradient.addColorStop(0, `hsla(${normalizedHue}, ${CONFIG.baseSaturation + 10}%, ${CONFIG.baseLightness + 10}%, 0.9)`);
    gradient.addColorStop(0.5, `hsla(${normalizedHue}, ${CONFIG.baseSaturation}%, ${CONFIG.baseLightness}%, 0.5)`);
    gradient.addColorStop(1, `hsla(${normalizedHue}, ${CONFIG.baseSaturation - 10}%, ${CONFIG.baseLightness - 10}%, 0)`);
    
    ctx.beginPath();
    ctx.arc(this.x, this.y, CONFIG.nodeRadius * 2, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
  }
}

// Initialize mesh
function initMesh() {
  nodes = [];
  
  const width = canvas.width;
  const height = canvas.height;
  
  // Create grid of nodes
  for (let x = 0; x < CONFIG.gridSize; x++) {
    for (let y = 0; y < CONFIG.gridSize; y++) {
      const px = (x / (CONFIG.gridSize - 1)) * width;
      const py = (y / (CONFIG.gridSize - 1)) * height;
      nodes.push(new MeshNode(px, py));
    }
  }
}

// Resize handler
function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  initMesh();
}

// Draw connections between nodes
function drawConnections(time) {
  const width = canvas.width;
  const height = canvas.height;
  
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const n1 = nodes[i];
      const n2 = nodes[j];
      
      const dx = n2.x - n1.x;
      const dy = n2.y - n1.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < CONFIG.connectionDistance) {
        // Opacity based on distance
        const opacity = 1 - (dist / CONFIG.connectionDistance);
        const avgHue = (n1.hue + n2.hue) / 2;
        const normalizedHue = ((avgHue % 360) + 360) % 360;
        
        // Wave effect on line - creates rippling liquid feel
        const waveOffset = Math.sin(time * CONFIG.waveFrequency + dist * 0.01) * 5;
        const midX = (n1.x + n2.x) / 2 + waveOffset;
        const midY = (n1.y + n2.y) / 2 + waveOffset;
        
        // Draw curved connection for fluid feel
        ctx.beginPath();
        ctx.moveTo(n1.x, n1.y);
        ctx.quadraticCurveTo(midX, midY, n2.x, n2.y);
        
        const gradient = ctx.createLinearGradient(n1.x, n1.y, n2.x, n2.y);
        gradient.addColorStop(0, `hsla(${normalizedHue}, ${CONFIG.baseSaturation}%, ${CONFIG.baseLightness}%, ${opacity * 0.6})`);
        gradient.addColorStop(0.5, `hsla(${normalizedHue}, ${CONFIG.baseSaturation + 5}%, ${CONFIG.baseLightness + 5}%, ${opacity * 0.8})`);
        gradient.addColorStop(1, `hsla(${normalizedHue}, ${CONFIG.baseSaturation}%, ${CONFIG.baseLightness}%, ${opacity * 0.6})`);
        
        ctx.strokeStyle = gradient;
        ctx.lineWidth = CONFIG.lineWidth * opacity;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }
  }
}

// Animation loop
function animate(currentTime) {
  lastTime = currentTime;
  
  // Clear canvas
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Update cursor velocity
  cursorVx = (cursorX - prevCursorX) * 0.5;
  cursorVy = (cursorY - prevCursorY) * 0.5;
  cursorSpeed = Math.sqrt(cursorVx * cursorVx + cursorVy * cursorVy);
  prevCursorX = cursorX;
  prevCursorY = cursorY;
  
  // Update nodes
  nodes.forEach(node => {
    node.update(currentTime, cursorX, cursorY, cursorVx, cursorVy, isCursorInCanvas);
  });
  
  // Draw connections first (behind nodes)
  drawConnections(currentTime);
  
  // Draw nodes on top
  nodes.forEach(node => {
    node.draw(ctx);
  });
  
  requestAnimationFrame(animate);
}

// Event listeners
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  cursorX = e.clientX - rect.left;
  cursorY = e.clientY - rect.top;
  isCursorInCanvas = true;
  
  if (hintVisible) {
    hint.style.opacity = '0';
    hintVisible = false;
  }
});

canvas.addEventListener('mouseleave', () => {
  isCursorInCanvas = false;
});

canvas.addEventListener('mouseenter', () => {
  prevCursorX = cursorX;
  prevCursorY = cursorY;
  isCursorInCanvas = true;
});

// Touch support
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  cursorX = touch.clientX - rect.left;
  cursorY = touch.clientY - rect.top;
  isCursorInCanvas = true;
  
  if (hintVisible) {
    hint.style.opacity = '0';
    hintVisible = false;
  }
}, { passive: false });

canvas.addEventListener('touchend', () => {
  isCursorInCanvas = false;
});

// Initialize
window.addEventListener('resize', resize);
resize();
animate(0);
})();
</script>
</body>
</html>
