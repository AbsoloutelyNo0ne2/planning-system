<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Fluid Particles</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-base: #0c0f1a;
  --bg-surface: #121625;
  --accent-300: #d8b4fe;
  --accent-400: #c084fc;
  --accent-500: #a855f7;
  --accent-600: #8b5cf6;
  --accent-700: #7c3aed;
  --text-primary: #f1f5f9;
  --text-muted: #94a3b8;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-base);
  min-height: 100vh;
  display: flex;
}

.container {
  display: flex;
  width: 100%;
  min-height: 100vh;
}

/* LEFT SIDE - Login Form */
.login-side {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background: var(--bg-base);
}

.login-form {
  width: 100%;
  max-width: 360px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 2.5rem;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--accent-500), var(--accent-300));
  border-radius: 10px;
}

.logo-text {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text-primary);
}

.login-title {
  font-size: 1.75rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
}

.login-subtitle {
  color: var(--text-muted);
  margin-bottom: 2rem;
  font-size: 0.9rem;
}

.form-group {
  margin-bottom: 1.25rem;
}

.form-label {
  display: block;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
}

.form-input {
  width: 100%;
  padding: 0.75rem 1rem;
  background: var(--bg-surface);
  border: 1px solid #1e293b;
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 0.95rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.form-input:focus {
  outline: none;
  border-color: var(--accent-500);
  box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
}

.form-input::placeholder {
  color: #475569;
}

.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  font-size: 0.85rem;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--text-muted);
  cursor: pointer;
}

.remember-me input {
  accent-color: var(--accent-500);
}

.forgot-link {
  color: var(--accent-400);
  text-decoration: none;
  transition: color 0.2s;
}

.forgot-link:hover {
  color: var(--accent-300);
}

.btn-primary {
  width: 100%;
  padding: 0.85rem;
  background: linear-gradient(135deg, var(--accent-500), #9333ea);
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
}

.divider {
  display: flex;
  align-items: center;
  margin: 1.5rem 0;
  color: var(--text-muted);
  font-size: 0.8rem;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #1e293b;
}

.divider span {
  padding: 0 1rem;
}

.signup-text {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.signup-link {
  color: var(--accent-400);
  text-decoration: none;
}

.signup-link:hover {
  color: var(--accent-300);
}

/* RIGHT SIDE - Interactive Canvas */
.canvas-side {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: radial-gradient(ellipse at 40% 40%, #1a1f35 0%, var(--bg-base) 70%);
}

#interactive-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: crosshair;
}

.canvas-hint {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(148, 163, 184, 0.5);
  font-size: 0.8rem;
  text-align: center;
  pointer-events: none;
  transition: opacity 0.3s;
}

.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 130% 130% at center, transparent 35%, rgba(12, 15, 26, 0.5) 100%);
  pointer-events: none;
}

/* Responsive */
@media (max-width: 900px) {
  .canvas-side {
    display: none;
  }
  .login-side {
    justify-content: center;
  }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .btn-primary:hover {
    transform: none;
  }
}
</style>
</head>
<body>
<div class="container">
  <!-- LEFT: Login Form -->
  <div class="login-side">
    <form class="login-form">
      <div class="logo">
        <div class="logo-icon"></div>
        <span class="logo-text">Planner</span>
      </div>

      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to continue to your workspace</p>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter your password">
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox">
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary">Sign in</button>

      <div class="divider">
        <span>or</span>
      </div>

      <p class="signup-text">
        Don't have an account? <a href="#" class="signup-link">Create one</a>
      </p>
    </form>
  </div>

  <!-- RIGHT: Interactive Canvas -->
  <div class="canvas-side">
    <canvas id="interactive-canvas"></canvas>
    <div class="canvas-hint">Move your cursor to interact</div>
    <div class="vignette"></div>
  </div>
</div>

<script>
(function() {
const canvas = document.getElementById('interactive-canvas');
const ctx = canvas.getContext('2d');
const hint = document.querySelector('.canvas-hint');

// Configuration
const CONFIG = {
  numParticles: 120,
  particleMinSize: 15,
  particleMaxSize: 45,
  
  // Flow field
  flowScale: 0.003,
  flowSpeed: 0.0003,
  flowStrength: 0.8,
  
  // Interaction
  interactionRadius: 180,
  cursorInfluence: 0.08,
  
  // Colors
  baseHue: 280,
  slowTint: 8,
  fastTint: -15,
  baseSaturation: 60,
  baseLightness: 55
};

// State
let particles = [];
let flowField = [];
let flowCols = 0;
let flowRows = 0;
let zoff = 0;
let cursorX = 0;
let cursorY = 0;
let prevCursorX = 0;
let prevCursorY = 0;
let cursorVx = 0;
let cursorVy = 0;
let isCursorInCanvas = false;
let hintVisible = false;
let lastTime = 0;

// Simplex-like noise approximation
function noise3D(x, y, z) {
  const X = Math.floor(x) & 255;
  const Y = Math.floor(y) & 255;
  const Z = Math.floor(z) & 255;
  
  x -= Math.floor(x);
  y -= Math.floor(y);
  z -= Math.floor(z);
  
  const u = fade(x);
  const v = fade(y);
  const w = fade(z);
  
  const A = p[X] + Y;
  const AA = p[A] + Z;
  const AB = p[A + 1] + Z;
  const B = p[X + 1] + Y;
  const BA = p[B] + Z;
  const BB = p[B + 1] + Z;
  
  return lerp(w,
    lerp(v,
      lerp(u, grad(p[AA], x, y, z), grad(p[BA], x - 1, y, z)),
      lerp(u, grad(p[AB], x, y - 1, z), grad(p[BB], x - 1, y - 1, z))
    ),
    lerp(v,
      lerp(u, grad(p[AA + 1], x, y, z - 1), grad(p[BA + 1], x - 1, y, z - 1)),
      lerp(u, grad(p[AB + 1], x, y - 1, z - 1), grad(p[BB + 1], x - 1, y - 1, z - 1))
    )
  );
}

function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function lerp(t, a, b) { return a + t * (b - a); }
function grad(hash, x, y, z) {
  const h = hash & 15;
  const u = h < 8 ? x : y;
  const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
  return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
}

// Permutation table
const p = new Array(512);
const permutation = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,
  140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,
  197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,
  136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,236,3,33,73,
  76,63,85,128,101,235,104,169,225,140,73,180,126,130,161,99,247,179,160,229,
  123,43,203,67,248,157,140,171,121,41,217,48,186,58,177,178,83,137,108,181,
  154,36,2,205,91,83,84,95,117,189,195,178,113,156,159,120,211,48,165,150,
  130,152,146,153,111,239,230,94,202,197,129,19,65,132,180,121,72,173,124,
  252,110,129,225,120,186,92,251,59,241,142,235,44,58,137,138,126,211,141,
  167,67,122,106,186,238,139,180,158,165,251,217,119,75,230,200,188,65,195,
  90,143,63,178,247,117,198,206,137,14,166,131,132,252,141,150,224,183,180,
  112,153,124,168,99,161,73,46,101,124,81,126,135,146,173,146,135,6,236,
  184,48,104,190,7,192,59,52,126,166,239,204,217,151,110,154,21,190,92,232,
  85,174,61,219,189,247,169,179,160,209,212,124,143,114,219,166,130,169,58,
  206,231,36,26,148,179,194,237,67,197,106,32,62,149,153,159,178,96,64,82,
  212,110,85,196,49,67,199,233,56,187,171,69,94,173,156,65,127,131,169,181,
  167,67,166,62,45,226,127,149,190,178,116,155,140,140,217,36,58,52,23,210,
  206,21,166,134,118,210,64,92,108,222,19,230,83,72,79,41,133,180,147,32,
  74,228,76,94,215,52,138,124,132,199,44,217,209,19,251,239,70,221,180,159,
  27,29,51,155,64,26,193,111,106,91,176,232,232,231,215,251,207,235,170,141,
  169,227,98,51,87,223,198,136,103,117,177,224,225,205,56,179,172,97,117,
  234,85,165,19,174,68,137,122,161,215,169,179,163,242,78,91,169,34,106,
  135,97,165,175,60,122,251,233,77,181,30,214,164,140,197,18,219,124,27,
  130,164,30,114,158,13,110,141,109,18,108,180,142,96,147,48,111,77,78,
  39,171,236,158,49,172,90,73,115,48,159,161,171,212,129,76,231,188,54,
  210,126,63,103,153,165,89,88,111,128,3,183,123,1,188,53,155,137,135,
  253,6,255,232,94,120,146,255,114,26,234,88,93,253,228,118,197,218,78,
  164,170,205,54,97,178,150,202,184,108,139,150,122,161,220,247,246,14,
  186,80,151,110,115,133,180,212,126,122,97,68,81,63,150,207,116,48,151,
  177,85,173,83,63,221,215,167,21,57,123,117,163,31,143,204,177,113,166,
  211,133,53,135,192,155,172,90,214,206,113,119,25,33,138,145,193,202,
  112,215,185,37,159,152,97,174,20,148,137,182,152,63,74,155,95,103,104,
  165,116,229,173,166,174,82,165,186,194,52,37,131,223,82,105,102,178,
  45,148,19,5,83,174,65,149,52,226,116,237,178,211,176,145,116,186,54,
  90,215,94,125,140,73,220,133,230,144,189,215,197,214,94,226,13,206,
  68,97,74,218,42,69,57,93,2,139,122,13,126,151,76,239,194,76,13,
  160,236,21,185,252,76,35,40,232,86,117,75,158,164,123,42,199,197,
  180,186,127,105,97,189,152,98,4,66,100,132,137,250,114,73,163,105,
  231,179,188,249,21,147,9,139,253,254,136,199,129,100,167,219,81,
  190,71,101,75,213,63,10,4,143,167,143,75,171,6,235,246,45,149,
  174,36,232,60,66,56,178,47,177,89,125,12,229,201,241,145,57,81,
  84,146,176,87,229,55,109,104,202,75,75,188,127,169,213,162,124,30,
  34,46,86,187,133,112,247,13,55,229,109,187,64,72,6,135,183,144,
  64,48,51,209,199,97,58,173,180,87,43,139,151,130,101,234,36,122,
  213,19,247,77,175,39,175,194,149,40,42,159,186,125,163,233,45,111,
  64,146,244,233,221,171,12,214,188,227,168,230,98,20,21,78,49,133,
  147,233,179,229,136,161,33,86,178,251,141,131,147,232,123,122,29,
  230,119,87,152,170,53,131,254,119,164,26,180,146,254];

for (let i = 0; i < 256; i++) {
  p[i] = permutation[i];
  p[256 + i] = permutation[i];
}

// Map speed to hue tint
function mapSpeedToTint(speed) {
  if (speed < 0.5) {
    return CONFIG.baseHue + CONFIG.slowTint;
  } else if (speed < 2) {
    const t = (speed - 0.5) / 1.5;
    return CONFIG.baseHue + CONFIG.slowTint - (CONFIG.slowTint * t);
  } else {
    const t = Math.min((speed - 2) / 4, 1);
    return CONFIG.baseHue + (CONFIG.fastTint * t);
  }
}

// Flow Particle class
class FlowParticle {
  constructor() {
    this.reset();
  }
  
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = 0;
    this.vy = 0;
    this.size = Math.random() * (CONFIG.particleMaxSize - CONFIG.particleMinSize) + CONFIG.particleMinSize;
    this.life = 1;
    this.maxLife = 200 + Math.random() * 300;
    this.age = 0;
    this.hue = CONFIG.baseHue;
    this.targetHue = CONFIG.baseHue;
  }
  
  update(flowField, cols, cursorX, cursorY, cursorVx, cursorVy, isCursorActive) {
    // Get flow angle from field
    const col = Math.floor(this.x / (canvas.width / cols));
    const row = Math.floor(this.y / (canvas.height / flowRows));
    const index = col + row * cols;
    
    if (index >= 0 && index < flowField.length) {
      const angle = flowField[index];
      
      // Move with flow
      this.vx += Math.cos(angle) * CONFIG.flowStrength;
      this.vy += Math.sin(angle) * CONFIG.flowStrength;
    }
    
    // Friction
    this.vx *= 0.96;
    this.vy *= 0.96;
    
    // Cursor influence
    if (isCursorActive) {
      const dx = cursorX - this.x;
      const dy = cursorY - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < CONFIG.interactionRadius && dist > 0) {
        const force = (CONFIG.interactionRadius - dist) / CONFIG.interactionRadius;
        
        // Push particles with cursor
        this.vx += cursorVx * force * CONFIG.cursorInfluence;
        this.vy += cursorVy * force * CONFIG.cursorInfluence;
      }
    }
    
    // Limit speed
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    const maxSpeed = 3;
    if (speed > maxSpeed) {
      this.vx = (this.vx / speed) * maxSpeed;
      this.vy = (this.vy / speed) * maxSpeed;
    }
    
    // Update color based on speed
    this.targetHue = mapSpeedToTint(speed);
    this.hue = this.hue + (this.targetHue - this.hue) * 0.05;
    
    // Update position
    this.x += this.vx;
    this.y += this.vy;
    
    // Age particle
    this.age++;
    this.life = 1 - (this.age / this.maxLife);
    
    // Wrap around edges
    if (this.x < -this.size) this.x = canvas.width + this.size;
    if (this.x > canvas.width + this.size) this.x = -this.size;
    if (this.y < -this.size) this.y = canvas.height + this.size;
    if (this.y > canvas.height + this.size) this.y = -this.size;
    
    // Reset if too old
    if (this.age > this.maxLife) {
      this.reset();
    }
  }
  
  draw(ctx) {
    const normalizedHue = ((this.hue % 360) + 360) % 360;
    const alpha = this.life * 0.7;
    
    const gradient = ctx.createRadialGradient(
      this.x, this.y, 0,
      this.x, this.y, this.size
    );
    
    gradient.addColorStop(0, `hsla(${normalizedHue}, ${CONFIG.baseSaturation + 15}%, ${CONFIG.baseLightness + 15}%, ${alpha})`);
    gradient.addColorStop(0.4, `hsla(${normalizedHue}, ${CONFIG.baseSaturation + 5}%, ${CONFIG.baseLightness + 5}%, ${alpha * 0.6})`);
    gradient.addColorStop(1, `hsla(${normalizedHue}, ${CONFIG.baseSaturation}%, ${CONFIG.baseLightness}%, 0)`);
    
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
  }
}

// Update flow field
function updateFlowField() {
  zoff += CONFIG.flowSpeed;
  
  for (let y = 0; y < flowRows; y++) {
    for (let x = 0; x < flowCols; x++) {
      const index = x + y * flowCols;
      const angle = noise3D(x * CONFIG.flowScale, y * CONFIG.flowScale, zoff) * Math.PI * 4;
      flowField[index] = angle;
    }
  }
}

// Initialize
function init() {
  particles = [];
  
  const cellSize = 30;
  flowCols = Math.ceil(canvas.width / cellSize);
  flowRows = Math.ceil(canvas.height / cellSize);
  flowField = new Array(flowCols * flowRows);
  
  for (let i = 0; i < CONFIG.numParticles; i++) {
    particles.push(new FlowParticle());
  }
}

// Resize handler
function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
  init();
}

// Animation loop
function animate(currentTime) {
  lastTime = currentTime;
  
  // Fade canvas slightly for trail effect
  ctx.fillStyle = 'rgba(12, 15, 26, 0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Update cursor velocity
  cursorVx = (cursorX - prevCursorX) * 0.5;
  cursorVy = (cursorY - prevCursorY) * 0.5;
  prevCursorX = cursorX;
  prevCursorY = cursorY;
  
  // Update flow field
  updateFlowField();
  
  // Update and draw particles
  particles.forEach(particle => {
    particle.update(flowField, flowCols, cursorX, cursorY, cursorVx, cursorVy, isCursorInCanvas);
    particle.draw(ctx);
  });
  
  requestAnimationFrame(animate);
}

// Event listeners
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  cursorX = e.clientX - rect.left;
  cursorY = e.clientY - rect.top;
  isCursorInCanvas = true;
  
  if (hintVisible) {
    hint.style.opacity = '0';
    hintVisible = false;
  }
});

canvas.addEventListener('mouseleave', () => {
  isCursorInCanvas = false;
});

canvas.addEventListener('mouseenter', () => {
  prevCursorX = cursorX;
  prevCursorY = cursorY;
  isCursorInCanvas = true;
});

// Touch support
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  cursorX = touch.clientX - rect.left;
  cursorY = touch.clientY - rect.top;
  isCursorInCanvas = true;
  
  if (hintVisible) {
    hint.style.opacity = '0';
    hintVisible = false;
  }
}, { passive: false });

canvas.addEventListener('touchend', () => {
  isCursorInCanvas = false;
});

// Initialize
window.addEventListener('resize', resize);
resize();
animate(0);
})();
</script>
</body>
