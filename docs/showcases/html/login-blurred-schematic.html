<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Planning System</title>
  <style>
    :root {
      --bg-base: #0c0f1a;
      --bg-surface: #121625;
      --bg-elevated: #1a1f30;
      --bg-input: #0a0d18;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-500: #a855f7;
      --accent-600: #8b5cf6;
      --accent-400: #c084fc;
      --accent-300: #d8b4fe;
      --border-default: #1e293b;
      --grid-color: rgba(168, 85, 247, 0.04);
      --node-inactive: rgba(168, 85, 247, 0.15);
      --node-active: rgba(168, 85, 247, 0.5);
      --line-color: rgba(168, 85, 247, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* LEFT HALF - Login Form */
    .login-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-surface);
      position: relative;
      z-index: 10;
    }

    .login-form {
      width: 100%;
      max-width: 340px;
      padding: 2rem;
    }

    .login-title {
      font-size: 1.625rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .login-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      letter-spacing: 0.01em;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 0.875rem;
      font-size: 0.9375rem;
      background: var(--bg-input);
      border: 1px solid var(--border-default);
      border-radius: 3px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .form-input:focus {
      border-color: var(--accent-500);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .login-button {
      width: 100%;
      padding: 0.8125rem 1rem;
      font-size: 0.9375rem;
      font-weight: 500;
      background: var(--accent-500);
      color: var(--bg-base);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background-color 0.15s ease, transform 0.1s ease;
      margin-top: 0.5rem;
    }

    .login-button:hover {
      background: var(--accent-400);
    }

    .login-button:active {
      transform: scale(0.98);
    }

    .login-button:focus-visible {
      outline: 2px solid var(--accent-400);
      outline-offset: 2px;
    }

    .login-footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-default);
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    /* RIGHT HALF - Schematic with Gradient Blur */
    .visual-panel {
      position: relative;
      overflow: hidden;
      background: var(--bg-base);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .schematic-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* The sharp schematic layer */
    .schematic-sharp {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.6;
    }

    /* The blurred schematic layer with gradient mask */
    .schematic-blur {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      filter: blur(20px);
      opacity: 0.8;
      mask-image: radial-gradient(
        ellipse 80% 70% at center,
        transparent 20%,
        rgba(0, 0, 0, 0.5) 50%,
        rgba(0, 0, 0, 0.9) 80%,
        black 100%
      );
      -webkit-mask-image: radial-gradient(
        ellipse 80% 70% at center,
        transparent 20%,
        rgba(0, 0, 0, 0.5) 50%,
        rgba(0, 0, 0, 0.9) 80%,
        black 100%
      );
    }

    /* Atmospheric glow layer */
    .schematic-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60%;
      height: 50%;
      background: radial-gradient(
        ellipse at center,
        rgba(168, 85, 247, 0.08) 0%,
        rgba(139, 92, 246, 0.04) 40%,
        transparent 70%
      );
      pointer-events: none;
    }

    /* SVG Styles */
    .grid-line {
      stroke: var(--grid-color);
      stroke-width: 1;
    }

    .connection {
      stroke: var(--line-color);
      stroke-width: 1;
      fill: none;
    }

    .node-circle {
      fill: var(--node-inactive);
      stroke: var(--accent-500);
      stroke-width: 1;
    }

    .node-square {
      fill: var(--node-inactive);
      stroke: var(--accent-500);
      stroke-width: 1;
    }

    .node-core {
      fill: var(--accent-600);
    }

    /* Pulse animations */
    @keyframes pulse-glow {
      0%, 100% {
        opacity: 0.15;
        filter: drop-shadow(0 0 2px rgba(168, 85, 247, 0.2));
      }
      50% {
        opacity: 0.45;
        filter: drop-shadow(0 0 6px rgba(168, 85, 247, 0.4));
      }
    }

    @keyframes line-pulse {
      0%, 100% { stroke-opacity: 0.12; }
      50% { stroke-opacity: 0.35; }
    }

    @keyframes subtle-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .node-pulse {
      animation: pulse-glow 4s ease-in-out infinite;
    }

    .node-pulse-slow {
      animation: pulse-glow 5.5s ease-in-out infinite;
    }

    .connection-pulse {
      animation: line-pulse 3.5s ease-in-out infinite;
    }

    .connection-pulse-slow {
      animation: line-pulse 4.5s ease-in-out infinite;
    }

    .schematic-wrapper {
      animation: subtle-float 12s ease-in-out infinite;
    }

    /* Staggered delays */
    .delay-1 { animation-delay: 0s; }
    .delay-2 { animation-delay: 0.7s; }
    .delay-3 { animation-delay: 1.4s; }
    .delay-4 { animation-delay: 2.1s; }
    .delay-5 { animation-delay: 2.8s; }

    /* Responsive */
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }

      .login-panel {
        order: 2;
        min-height: 60vh;
      }

      .visual-panel {
        order: 1;
        min-height: 40vh;
      }

      .schematic-wrapper {
        transform: scale(0.85);
      }
    }

    @media (max-width: 480px) {
      .login-form {
        padding: 1.5rem;
      }

      .login-title {
        font-size: 1.375rem;
      }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .node-pulse,
      .node-pulse-slow,
      .connection-pulse,
      .connection-pulse-slow,
      .schematic-wrapper {
        animation: none;
      }

      .node-pulse,
      .node-pulse-slow {
        opacity: 0.25;
      }

      .connection-pulse,
      .connection-pulse-slow {
        stroke-opacity: 0.2;
      }
    }
  </style>
</head>
<body>

    <!-- LEFT: Login Form -->

      <form class="login-form" onsubmit="return false;">
        <h1 class="login-title">Planning System</h1>

        <div class="form-group">

          <input
            type="password"
            id="passphrase"
            class="form-input"
            placeholder="Enter passphrase"
            autocomplete="current-password"

        </div>

        <button type="submit" class="login-button">Enter</button>

        <div class="login-footer">
          Secure passphrase-based authentication
        </div>
